name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  actions: write
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
          scope: '@mlightcad'

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Verify package.json versions match overrides
        if: startsWith(github.ref, 'refs/tags/')
        run: pnpm sync:versions:check

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint code
        run: pnpm lint

      - name: Build projects
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          pnpm run build

      - name: Run tests
        run: pnpm test

      # Use system Google Chrome (preinstalled on ubuntu-latest) via channel "chrome".
      # Avoids playwright install chromium, which often hangs at zip extraction on CI.
      - name: Install Playwright system dependencies
        run: pnpm --filter @mlightcad/cad-viewer-example exec playwright install-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @mlightcad/cad-viewer-example test:e2e
        env:
          PLAYWRIGHT_BROWSER_CHANNEL: chrome

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-artifacts
          path: |
            packages/cad-viewer-example/playwright-report/
            packages/cad-viewer-example/test-results/
          if-no-files-found: ignore

      - name: Build docs
        run: pnpm doc

      - name: Pre-serve
        run: pnpm pre-serve

      # Authenticates via npm Trusted Publishing (OIDC); no NPM_TOKEN needed.
      # Configure each package on npmjs.com → Settings → Trusted publishing:
      #   Provider: GitHub Actions
      #   Repository: mlightcad/cad-viewer
      #   Workflow filename: ci.yml
      #   Environment: release  (must match the job environment below)
      - name: Publish packages to npm
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          npm --version
          # setup-node writes an empty _authToken line that blocks OIDC fallback
          if [ -f "$HOME/.npmrc" ]; then
            sed -i '/_authToken/d' "$HOME/.npmrc"
          fi
          pnpm publish:viewer

      - name: Create github release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true

      - name: Upload github pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: './packages/examples/public/'

  deploy-pages:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
